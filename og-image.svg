<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d5016"/>
      <stop offset="100%" stop-color="#1a3a0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#1a3a0a"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="547" cy="243" r="77" fill="#1a3a0a" opacity="0.10"/>
    <circle cx="464" cy="631" r="95" fill="#1a3a0a" opacity="0.08"/>
    <circle cx="943" cy="170" r="37" fill="#1a3a0a" opacity="0.18"/>
    <circle cx="774" cy="626" r="87" fill="#1a3a0a" opacity="0.12"/>
    <circle cx="982" cy="165" r="32" fill="#1a3a0a" opacity="0.10"/>
    <circle cx="332" cy="171" r="20" fill="#1a3a0a" opacity="0.06"/>
    <rect x="26" y="250" width="41" height="42" rx="8" fill="#2d5016" opacity="0.11" transform="rotate(1, 750, 257)"/>
    <rect x="684" y="616" width="99" height="98" rx="8" fill="#2d5016" opacity="0.04" transform="rotate(21, -84, 24)"/>
    <rect x="653" y="358" width="24" height="55" rx="8" fill="#2d5016" opacity="0.06" transform="rotate(18, 657, 24)"/>
    <rect x="19" y="526" width="24" height="78" rx="8" fill="#2d5016" opacity="0.08" transform="rotate(12, 799, 179)"/>
    <rect x="747" y="362" width="30" height="63" rx="8" fill="#2d5016" opacity="0.08" transform="rotate(31, 1256, 555)"/>
    <rect x="29" y="558" width="41" height="79" rx="8" fill="#2d5016" opacity="0.10" transform="rotate(40, 833, 722)"/>
    <rect x="756" y="-25" width="96" height="72" rx="8" fill="#2d5016" opacity="0.04" transform="rotate(13, 1068, 534)"/>
    <rect x="-85" y="177" width="83" height="41" rx="8" fill="#2d5016" opacity="0.13" transform="rotate(8, 143, -78)"/>
    <polygon points="297,205 351,313 243,313" fill="#1a3a0a" opacity="0.12"/>
    <polygon points="396,104 467,246 325,246" fill="#1a3a0a" opacity="0.03"/>
    <polygon points="249,353 289,433 209,433" fill="#1a3a0a" opacity="0.10"/>
    <polygon points="262,49 295,115 229,115" fill="#1a3a0a" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,582 C360,606 840,558 1200,582 L1200,630 L0,630Z" fill="#1a3a0a" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    가양 클럽 룩북
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    가양 — 클럽
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#c8a96e" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#c8a96e" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    가양 가양 클럽 룩북 — 클럽
  </text>
</svg>